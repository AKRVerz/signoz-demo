version: "3.8"

services:
  payment-service:
    build: ./service-b
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://host.docker.internal:4318}
      - OTEL_DEPLOYMENT_ENVIRONMENT=${OTEL_DEPLOYMENT_ENVIRONMENT:-demo}
      - PORT=8082
    ports:
      - "8082:8082"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  checkout-service:
    build: ./service-a
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://host.docker.internal:4318}
      - OTEL_DEPLOYMENT_ENVIRONMENT=${OTEL_DEPLOYMENT_ENVIRONMENT:-demo}
      - PAYMENT_SERVICE_URL=http://payment-service:8082
      - PORT=8081
    ports:
      - "8081:8081"
    depends_on:
      - payment-service
    extra_hosts:
      - "host.docker.internal:host-gateway"
